name: ci

# Continuous integration for the V1 critical path.
#
# Runs on every push and pull request: type-checking, the full node:test
# suite, a build smoke check, and a targeted coverage report over the
# critical-path modules (config resolution + context generation). No LLM,
# API key or network access is required — the suite is fully deterministic.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-platform: catch Windows-specific path/behaviour regressions.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Build smoke check
        run: pnpm build

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      - name: Critical-path coverage report
        run: pnpm test:coverage
